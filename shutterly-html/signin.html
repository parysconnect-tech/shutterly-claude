<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign in · Shutterly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="auth-split">
    <aside class="auth-art">
      <img src="https://images.unsplash.com/photo-1495312040802-a929cd14a6ab?auto=format&fit=crop&w=1600&q=70" alt="">
      <div class="auth-art-veil"></div>
      <div class="auth-art-content">
        <a href="index.html" class="logo" style="color:white;">
          <span class="logo-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="4"/><path d="M3 9a2 2 0 0 1 2-2h2l1.5-2.4A2 2 0 0 1 10.2 4h3.6a2 2 0 0 1 1.7.9L17 7h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/></svg>
          </span>
          <span>Shutterly</span>
        </a>
        <div style="margin-top:auto; max-width:420px;">
          <p class="heading-display text-3xl leading-tight">Make the photographs that already live in your head.</p>
          <p class="text-sm" style="margin-top:12px; opacity:0.85;">Free, modern photography courses with weekly challenges, interactive simulators and a South African heart.</p>
        </div>
      </div>
    </aside>

    <div style="display:flex; flex-direction:column;">
      <header class="auth-top-bar">
        <a href="index.html" class="logo">
          <span class="logo-mark">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="13" r="4"/><path d="M3 9a2 2 0 0 1 2-2h2l1.5-2.4A2 2 0 0 1 10.2 4h3.6a2 2 0 0 1 1.7.9L17 7h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"/></svg>
          </span>
          <span>Shutter<span class="logo-text-accent">ly</span></span>
        </a>
      </header>
      <div class="auth-content">
        <div class="auth-content-inner">
          <h1 class="heading-display text-3xl">Sign in to Shutterly</h1>
          <p class="text-sm text-muted" style="margin-top:8px;">New to Shutterly? <a class="text-brand" href="signup.html">Create account</a></p>
          <form id="signin-form" style="margin-top:32px; display:flex; flex-direction:column; gap:16px;">
            <div class="field">
              <label class="field-label">Email address</label>
              <input class="input" id="email" type="email" autocomplete="email" required>
            </div>
            <div class="field">
              <label class="field-label">Password</label>
              <input class="input" id="password" type="password" autocomplete="current-password" required>
            </div>
            <div style="display:flex; justify-content:flex-end;">
              <a class="text-sm text-muted" href="forgot.html">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Sign in</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    document.getElementById('signin-form').addEventListener('submit', (e) => {
      e.preventDefault();
      try {
        window.Shutterly.Auth.signIn({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        });
        window.Shutterly.toast('Signed in.', 'success');
        const next = new URLSearchParams(location.search).get('next') || 'dashboard.html';
        setTimeout(() => location.href = next, 400);
      } catch (err) {
        window.Shutterly.toast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
