<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Gallery · Shutterly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div data-header></div>
  <main class="container-wide" style="padding:48px 0;">
    <h1 class="heading-display text-4xl">Student Gallery</h1>
    <p class="text-muted" style="margin-top:8px;">A wall built by the people learning right alongside you.</p>
    <div id="gallery-root" style="margin-top:32px;"></div>
  </main>
  <div data-footer></div>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    const submissions = window.Shutterly.Submissions.all();
    const root = document.getElementById('gallery-root');
    if (submissions.length === 0) {
      root.innerHTML = `
        <div style="margin-top:32px; padding:48px; border:2px dashed var(--border); background:color-mix(in oklab, var(--muted), transparent 60%); border-radius:18px; text-align:center;">
          <p style="font-size:32px;">📸</p>
          <p class="heading-display text-lg" style="margin-top:8px;">No submissions yet.</p>
          <p class="text-sm text-muted">Be the first to submit a challenge frame.</p>
          <a class="btn btn-primary" style="margin-top:16px;" href="challenges.html">Open a challenge</a>
        </div>`;
    } else {
      const grid = document.createElement('div');
      grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 md:grid-cols-4 gap-4';
      submissions.forEach(s => {
        const c = window.SHUTTERLY_DATA.challenges.find(x => x.slug === s.challengeSlug);
        grid.innerHTML += `
          <div class="card" style="overflow:hidden;">
            <div style="aspect-ratio:4/5; background:var(--muted); position:relative;">
              <img src="${s.dataUrl}" alt="" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;">
            </div>
            <div class="card-content">
              <p class="text-xs text-muted uppercase tracking-wider">${c ? c.title.en : s.challengeSlug}</p>
              <p class="text-sm font-medium" style="margin-top:4px;">${s.userName || 'Anonymous'}</p>
              ${s.caption ? `<p class="text-xs text-muted line-clamp-2" style="margin-top:4px;">${s.caption}</p>` : ''}
            </div>
          </div>`;
      });
      root.appendChild(grid);
    }
  </script>
</body>
</html>
